# Optional: run the airplane API backend with Docker Compose.
# From project root: docker compose up --build
# API: http://localhost:3000

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/airplane-app
      dockerfile: Dockerfile
    ports: 
      - "4200:4200"
    volumes:
      - ./frontend/airplane-app:/app
      - /app/node_modules
    command: npm start
    restart: always
    depends_on:
      - backend
