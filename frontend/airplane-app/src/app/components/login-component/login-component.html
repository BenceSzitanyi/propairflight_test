<div class="login-container">
  <div class="login-card">
    <h2> Airline Staff Login</h2>
    <p>Please enter your credentials to manage the fleet.</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input id="email" type="email" formControlName="email" placeholder="pilot@airline.com">
        @if (isFieldInvalid("email")) {
          <small class="error-text">Please enter a valid email address</small>
        }
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" placeholder="*******">
        @if (isFieldInvalid("email")) {
          <small class="error-text">Password is required!</small>
        }
      </div>

      <button type="submit" [disabled]="loginForm.invalid" class="login-btn">
        Login
      </button>

      <div class="hint">
        <p>Try: <strong>pilot[at]airline.com</strong> / <strong>pilot123</strong></p>
      </div>
    </form>
  </div>
</div>
