<div class="form-container">
  <h2>Edit airplane</h2>

  @if (isLoading) {
    <p>Loading airplane data...</p>
  } @else {
    <form [formGroup]="airplaneForm" (ngSubmit)="onSubmit()">
      <div class="field">
        <label>Tail number</label>
        <input formControlName="tailNumber" type="text">
      </div>

      <div class="field">
        <label>Model</label>
        <input formControlName="model" type="text">
      </div>

      <div class="field">
        <label>Manufacturer</label>
        <input formControlName="manufacturer" type="text">
      </div>

      <div class="field">
        <label>Capacity</label>
        <input formControlName="capacity" type="number">
      </div>

      @if (errorMessage) {
        <p class="error">{{ errorMessage }}</p>
      }

      <div class="actions">
        <button type="submit" [disabled]="airplaneForm.invalid || isSaving">
          {{ isSaving ? 'Saving...' : 'Update Airplane' }}
        </button>
        <button type="button" (click)="onCancel()">Cancel</button>
      </div>
    </form>
  }
</div>
