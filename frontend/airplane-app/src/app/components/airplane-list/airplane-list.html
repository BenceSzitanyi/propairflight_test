<h2>Airplanes</h2>
<button routerLink="/airplanes/new" class="add-btn">+ Add New Airplane</button>

<div class="airplane-container">
  @if (airplanes.length > 0){
    <table>
      <thead>
        <tr>
          <th>Tail Number</th>
          <th>Model</th>
          <th>Manufacturer</th>
        </tr>
      </thead>

      <tbody>
        @for (plane of airplanes; track plane.id) {
          <tr [ngClass]="{'maintenance-row': plane.status === 'maintenance'}">
            <a [routerLink]="['/airplanes',plane.id]">
              <td>{{ plane.tailNumber | tailNumber}}</td>
            </a>
            <td>{{ plane.model }}</td>
            <td>{{ plane.manufacturer }}</td>
          </tr>
        }
      </tbody>
    </table>
  } @else {
    <p>No airplanes found in the system.</p>
  }
</div>
